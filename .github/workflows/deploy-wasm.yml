name: Deploy WASM Demo

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      - name: Publish WASM
        run: >
          dotnet publish
          src/TermPoint.Browser/TermPoint.Browser.csproj
          -c Release

      - name: Prepare Pages artifact
        run: |
          BUNDLE="src/TermPoint.Browser/bin/Release/net10.0-browser/browser-wasm/AppBundle"
          touch "$BUNDLE/.nojekyll"
          sed -i "s|from './_framework/dotnet.js'|from '/SchedulingAssistant/_framework/dotnet.js'|" "$BUNDLE/index.html"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/TermPoint.Browser/bin/Release/net10.0-browser/browser-wasm/AppBundle

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

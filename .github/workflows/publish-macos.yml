name: Publish macOS

# Triggered either:
#   1. When publish.ps1 pushes a version tag (e.g. v1.0.14).
#   2. Manually via `gh workflow run publish-macos.yml` from the dev console.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.2.1)'
        required: true

permissions:
  contents: write   # required to upload assets to the GitHub release

jobs:
  publish-osx:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install vpk
        run: dotnet tool install -g vpk

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Publish macOS
        run: |
          dotnet publish src/TermPoint/TermPoint.csproj \
            -c Release -r osx-x64 --self-contained -o ./publish/osx

      - name: Pack macOS
        run: |
          vpk pack \
            --packId TermPoint \
            --packVersion ${{ steps.version.outputs.VERSION }} \
            --packDir ./publish/osx \
            --mainExe TermPoint \
            --outputDir ./releases/osx

      - name: Upload macOS to GitHub release
        run: |
          vpk upload github \
            --repoUrl https://github.com/gschlitt/SchedulingAssistant \
            --token ${{ secrets.GITHUB_TOKEN }} \
            --outputDir ./releases/osx \
            --tag v${{ steps.version.outputs.VERSION }} \
            --releaseName v${{ steps.version.outputs.VERSION }} \
            --merge

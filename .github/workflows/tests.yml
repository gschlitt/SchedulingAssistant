name: Tests

# Runs the xUnit suite on every push to master and on every pull request
# targeting master. Real-data integration tests that need a machine-local
# database file are skipped automatically (see FactRequiresLocalDbAttribute),
# so a clean checkout on the runner still goes green.
#
# Runs on windows-latest because the app ships to Windows and macOS only.
# Several tests assert Windows file-system semantics (invalid filename chars,
# "\" path separators, file-locking behaviour) that legitimately differ on
# Linux, so a Linux runner would report false failures for a platform we
# don't support.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: windows-latest
    # Hard backstop: a healthy run finishes in a few minutes. If anything hangs,
    # kill the whole job at 15 min instead of letting it run for hours.
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Run tests
        run: >
          dotnet test
          src/SchedulingAssistant.Tests/SchedulingAssistant.Tests.csproj
          --configuration Release
          --verbosity normal
          --results-directory ${{ github.workspace }}/TestResults
          --blame-hang-timeout 3m
          --blame-hang-dump-type none

      # Always upload the blame "sequence" file. When a hang trips the 3-minute
      # inactivity timer, this names the test that was last active before the
      # host stalled — the thing keeping the process alive.
      - name: Upload hang diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ${{ github.workspace }}/TestResults
          if-no-files-found: ignore
